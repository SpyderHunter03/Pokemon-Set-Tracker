name: Build container image

# Builds a Docker image on every push to dev/main and publishes it to GitHub's
# registry (ghcr.io). Not required for the Proxmox LXC deployment (which pulls
# straight from git), but handy if you ever want to run the app as a container:
#   docker run -p 3000:3000 ghcr.io/spyderhunter03/pokemon-set-tracker:latest
# Tags: main → latest, dev → dev (plus the commit SHA).

on:
  push:
    branches: [dev, main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          TAG="${{ github.ref_name == 'main' && 'latest' || 'dev' }}"
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:${GITHUB_SHA::7}" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:${GITHUB_SHA::7}"
